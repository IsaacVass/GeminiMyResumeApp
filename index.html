<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vass Portfolio & Resume</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <h1 id="header-name">Your Name</h1>
        <div class="header-links">
            <a id="link-linkedin" href="#" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a id="link-github" href="#" target="_blank"><i class="fab fa-github"></i> GitHub</a>
            <a id="link-email" href="#"><i class="fas fa-envelope"></i> Email</a>
        </div>
    </header>

    <nav class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('about')">About Me</button>
        <button class="tab-btn" onclick="switchTab('resume')">Resume And Documents</button>
        <button class="tab-btn" onclick="switchTab('projects')">Projects</button>
        <button class="tab-btn" onclick="switchTab('experience')">Work Experience</button>
        <button class="tab-btn" onclick="switchTab('education')">Education</button>
    </nav>

    <main class="content-container">

        <section id="about" class="tab-section active">
            <h2>About Me</h2>
            <div class="profile-container">
                <div class="profile-photo-wrapper">
                    <img id="profile-img" src="" alt="Profile Picture">
                </div>
                <div class="about-bio">
                    <p id="about-text"></p>
                </div>
            </div>

            <hr class="section-divider">

            <div class="skills-header">
                <h3>Technical Skills and Operating Systems</h3>
                <div class="skills-controls">
                    <input type="text" id="skill-search" placeholder="Filter skills..." oninput="renderSkills()">
                    <select id="skill-sort" onchange="renderSkills()">
                        <option value="none">Sort by...</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="rating-desc">Rating (High to Low)</option>
                    </select>
                </div>
            </div>

            <div id="skills-grid" class="cards-grid">
                </div>
        </section>

        <section id="resume" class="tab-section">
            <h2>Resume</h2>
            <div id="resume-viewer" class="resume-viewer-container">
                </div>
        </section>

        <section id="projects" class="tab-section">
            <div class="section-header">
                <h2>Projects</h2>
            </div>

            <h3 class="subsection-title"><i class="fas fa-star text-gold"></i> Featured Projects</h3>
            <div id="featured-projects-grid" class="cards-grid">
                </div>

            <hr class="section-divider">

            <h3 class="subsection-title">All Projects</h3>
            <div id="all-projects-grid" class="cards-grid">
                </div>
        </section>

        <section id="experience" class="tab-section">
            <div class="section-header">
                <h2>Work Experience</h2>
            </div>
            <div id="experience-list" class="experience-list-container">
                </div>
        </section>

        <section id="education" class="tab-section">
            <div class="education-header">
                <h2 id="edu-institution">Institution Name</h2>
                <h4 id="edu-degree">Degree Program</h4>
                <p id="edu-description" class="edu-desc-text"></p>
                <div class="edu-meta">
                    <a id="edu-link" href="#" target="_blank">Institution Website</a>
                    <div class="transcript-wrapper">
                        <a id="view-transcript-btn" href="#" target="_blank" class="view-btn-sm"><i class="fas fa-file-pdf"></i> View Unofficial Transcript</a>
                    </div>
                </div>
            </div>

            <hr class="section-divider">

            <div class="classes-header">
                <h3>Highlighted Courses</h3>
            </div>
            <div id="classes-grid" class="cards-grid">
                </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
